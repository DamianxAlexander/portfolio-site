<style>
  @keyframes quantum-wave {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .animate-quantum-wave {
    animation: quantum-wave 2s linear infinite;
  }
</style>

<header class="w-full bg-neutral-950 border-b border-neutral-800 text-white sticky top-0 z-50">
  
  <div class="px-4 md:px-8 py-5 flex justify-between items-center">
    
    <div class="text-xl md:text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-linear-to-r from-cyan-400 to-blue-500">
      Damian Alexander Salgado
    </div>

    <button class="md:hidden text-neutral-400 hover:text-white transition-colors" (click)="isMobileMenuOpen = !isMobileMenuOpen" aria-label="Toggle Menu">
      <svg class="w-7 h-7 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm18 5H3v2h18v-2z"/>
      </svg>
    </button>

    <div class="hidden md:flex items-center gap-8">
      <nav class="flex gap-6 text-sm font-medium">
        @for (tab of tabs; track tab) {
          <button 
            (click)="tabChange.emit(tab)"
            [class.text-white]="currentTab() === tab"
            [class.text-neutral-500]="currentTab() !== tab"
            class="relative group hover:text-white transition-colors font-semibold py-1">
            {{ tab }}
            
            <div class="absolute -bottom-2 left-0 w-full h-3 overflow-hidden opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <svg class="h-full w-[200%] animate-quantum-wave" preserveAspectRatio="none" viewBox="0 0 100 10">
                <defs>
                  <linearGradient id="synthwave" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#22d3ee" />
                    <stop offset="25%" stop-color="#d946ef" />
                    <stop offset="50%" stop-color="#9333ea" />
                    <stop offset="75%" stop-color="#d946ef" />
                    <stop offset="100%" stop-color="#22d3ee" />
                  </linearGradient>
                </defs>
                <path d="M 0 5 Q 12.5 0, 25 5 T 50 5 T 75 5 T 100 5" fill="none" stroke="url(#synthwave)" stroke-width="1.5" class="opacity-80"/>
                <path d="M 0 5 Q 12.5 10, 25 5 T 50 5 T 75 5 T 100 5" fill="none" stroke="url(#synthwave)" stroke-width="1" class="opacity-40"/>
              </svg>
            </div>
          </button>
        }
      </nav>

      <div class="flex items-center gap-5 border-l border-neutral-800 pl-8">
        <a href="https://www.linkedin.com/in/damiansalgado" target="_blank" rel="noopener noreferrer" class="text-neutral-500 hover:text-cyan-400 transition-colors">
          <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
        <a href="https://github.com/DamianxAlexander" target="_blank" rel="noopener noreferrer" class="text-neutral-500 hover:text-white transition-colors">
          <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        </a>
      </div>
    </div>
  </div>

  @if (isMobileMenuOpen) {
    <div class="md:hidden border-t border-neutral-800 bg-neutral-950 px-4 py-4 flex flex-col gap-2 shadow-xl shadow-black">
      @for (tab of tabs; track tab) {
        <button 
          (click)="tabChange.emit(tab); isMobileMenuOpen = false"
          [class.text-white]="currentTab() === tab"
          [class.text-neutral-500]="currentTab() !== tab"
          class="text-left hover:text-white transition-colors font-semibold py-3 px-2 rounded-md hover:bg-neutral-900">
          {{ tab }}
        </button>
      }
      
      <div class="flex items-center gap-6 pt-6 mt-2 border-t border-neutral-800 px-2">
        <a href="https://www.linkedin.com/in/damiansalgado" target="_blank" rel="noopener noreferrer" class="text-neutral-500 hover:text-cyan-400">
          <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
        <a href="https://github.com/DamianxAlexander" target="_blank" rel="noopener noreferrer" class="text-neutral-500 hover:text-white">

      </div>
    </div>
  }
</header>
